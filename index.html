<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHICHI - Social Media</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="mainApp">
        <div id="mainContent">
            <!-- FEED VIEW -->
            <div class="view active" id="feedView">
                <div class="view-header">
                    <h1>CHICHI</h1>
                    <div class="view-header-actions">
                        <button class="header-btn" onclick="alert('Notifications')">🔔</button>
                    </div>
                </div>
                
                <!-- Stories Container -->
                <div class="stories-container" id="storiesContainer"></div>
                
                <!-- Feed Content -->
                <div id="feedContainer"></div>
            </div>

            <!-- MESSAGES VIEW -->
            <div class="view" id="messagesView">
                <div class="messages-header">
                    <h2>Messages</h2>
                    <div class="search-bar">
                        <span style="font-size: 18px; margin-right: 8px;">🔍</span>
                        <input type="text" placeholder="Search conversations..." id="messagesSearchInput" onkeyup="app.searchMessages(this.value)">
                    </div>
                    <div class="filter-tabs" id="messagesFilterTabs">
                        <div class="filter-tab active" onclick="app.filterMessages('all')">All</div>
                        <div class="filter-tab" onclick="app.filterMessages('unread')">Unread</div>
                        <div class="filter-tab" onclick="app.filterMessages('favorites')">Favorites</div>
                    </div>
                </div>
                <div class="messages-container" id="messageList"></div>
            </div>

            <!-- CHAT VIEW -->
            <div class="view" id="chatView">
                <div id="chatHeader">
                    <button onclick="app.closeChatView()">←</button>
                    <div id="chatHeaderAvatar"></div>
                    <div style="flex: 1;">
                        <div id="chatHeaderName" style="color: white; font-weight: 700;"></div>
                        <div id="chatHeaderStatus"></div>
                    </div>
                    <button onclick="alert('Call')">📹</button>
                    <button onclick="alert('Call')">☎️</button>
                    <button onclick="app.showChatMenu()">⋯</button>
                </div>
                <div id="chatMessages"></div>
                <div id="chatInput">
                    <button onclick="alert('Attach')">📎</button>
                    <input type="text" id="chatMessageInput" placeholder="Type a message...">
                    <button onclick="app.sendChatMessage()">📤</button>
                </div>
            </div>

            <!-- EXPLORE VIEW -->
            <div class="view" id="exploreView">
                <div class="view-header">
                    <h2>🔍 Discover</h2>
                    <button class="header-btn" onclick="app.loadExplore()">🔄</button>
                </div>
                
                <div class="explore-search">
                    <div class="explore-search-input">
                        <span style="font-size: 20px;">🔍</span>
                        <input type="text" id="exploreSearchInput" placeholder="Search for a user..." onkeyup="app.searchExploreUsers(this.value)">
                    </div>
                </div>
                
                <div style="flex: 1; overflow-y: auto;">
                    <div id="signupMapContainer" style="height: 350px; margin: 16px; border-radius: 12px; overflow: hidden; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.1);"></div>
                    <div id="trendingSection"></div>
                    <div id="exploreSearchResults" style="display: none; padding: 16px;"></div>
                </div>
            </div>

            <!-- GROUPS VIEW -->
            <div class="view" id="groupsView">
                <div class="view-header">
                    <h2>Groups</h2>
                    <button class="header-btn" onclick="app.showCreateGroupModal()">➕</button>
                </div>
                <div id="groupsList"></div>
            </div>

            <!-- PROFILE VIEW -->
            <div class="view" id="profileView">
                <div id="profileContent"></div>
            </div>

            <!-- AUTH PAGE -->
            <div id="authPage" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 150; background: white; padding: 20px;"></div>

            <!-- LOADING SCREEN -->
            <div id="loadingScreen" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 100; background: white; display: flex; align-items: center; justify-content: center;">
                <div style="text-align: center;">
                    <div style="font-size: 48px; animation: spin 1s linear infinite;">⚙️</div>
                    <div style="margin-top: 16px; color: #666;">Loading...</div>
                </div>
            </div>
        </div>

        <!-- BOTTOM NAVIGATION -->
        <div class="bottom-nav">
            <div class="nav-wrapper">
                <div class="nav-item active" onclick="app.switchView('feed')">
                    <div class="nav-icon">🏠</div>
                    <div>Home</div>
                </div>
                <div class="nav-item" onclick="app.switchView('explore')">
                    <div class="nav-icon">🔍</div>
                    <div>Explore</div>
                </div>
                <div class="nav-item-fab" onclick="app.showCreatePostModal()" style="position: absolute; bottom: 20px;">
                    ➕
                </div>
                <div class="nav-item" onclick="app.switchView('messages')">
                    <div class="nav-icon">💬</div>
                    <div>Messages</div>
                </div>
                <div class="nav-item" onclick="app.switchView('profile')">
                    <div class="nav-icon">👤</div>
                    <div>Profile</div>
                </div>
            </div>
        </div>

        <!-- TOASTS -->
        <div id="toastContainer" style="position: fixed; top: 20px; right: 20px; z-index: 2000; max-width: 300px;"></div>
    </div>

    <!-- Scripts -->
    <script src="config.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://upload-widget.cloudinary.com/latest/global/loader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
    <script src="js/app.js"></script>
</body>
</html>

<style>
    @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }
</style>
