<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHICHI - Debug Mode</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', monospace;
            background: #1f2937;
            color: #e5e7eb;
            padding: 20px;
            min-height: 100vh;
        }

        .debug-container {
            max-width: 600px;
            margin: 0 auto;
            background: #111827;
            border-radius: 12px;
            padding: 20px;
            border: 2px solid #00D4AA;
        }

        h1 {
            color: #00D4AA;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .log-section {
            background: #1f2937;
            border-left: 4px solid #00D4AA;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 8px;
            font-size: 0.85rem;
        }

        .log-section.error {
            border-left-color: #ef4444;
            background: #7f1d1d;
        }

        .log-section.success {
            border-left-color: #22c55e;
            background: #1b4332;
        }

        .log-section.warning {
            border-left-color: #f59e0b;
            background: #78350f;
        }

        .log-text {
            font-family: 'Courier New', monospace;
            word-break: break-all;
            line-height: 1.4;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.75rem;
            margin-top: 8px;
        }

        .status-badge.loading {
            background: #f59e0b;
            color: #000;
        }

        .status-badge.error {
            background: #ef4444;
            color: #fff;
        }

        .status-badge.success {
            background: #22c55e;
            color: #fff;
        }

        .checklist {
            background: #1f2937;
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
        }

        .checklist-item {
            display: flex;
            gap: 8px;
            padding: 8px 0;
            border-bottom: 1px solid #374151;
        }

        .checklist-item:last-child {
            border-bottom: none;
        }

        .checkmark {
            font-weight: bold;
            min-width: 20px;
        }

        .checkmark.success { color: #22c55e; }
        .checkmark.error { color: #ef4444; }
        .checkmark.loading { color: #f59e0b; }
    </style>
</head>
<body>

<div class="debug-container">
    <h1>🔍 CHICHI Debug Console</h1>
    <p style="margin-bottom: 20px; color: #9ca3af;">Checking what's preventing your site from loading...</p>
    
    <div id="debugLogs"></div>

    <div class="checklist">
        <h3 style="color: #00D4AA; margin-bottom: 12px;">Initialization Checklist</h3>
        <div class="checklist-item">
            <span class="checkmark loading" id="check1">⏳</span>
            <span>Firebase SDK Loaded</span>
        </div>
        <div class="checklist-item">
            <span class="checkmark loading" id="check2">⏳</span>
            <span>Firebase Initialized</span>
        </div>
        <div class="checklist-item">
            <span class="checkmark loading" id="check3">⏳</span>
            <span>Auth Listener Active</span>
        </div>
        <div class="checklist-item">
            <span class="checkmark loading" id="check4">⏳</span>
            <span>Database Connection</span>
        </div>
    </div>
</div>

<script>
const logs = [];
const debugDiv = document.getElementById('debugLogs');

function addLog(message, type = 'info') {
    const timestamp = new Date().toLocaleTimeString();
    logs.push({ message, type, timestamp });
    
    const logEl = document.createElement('div');
    logEl.className = `log-section ${type}`;
    logEl.innerHTML = `
        <div class="log-text">
            <strong>[${timestamp}] ${type.toUpperCase()}</strong><br>
            ${message}
        </div>
    `;
    debugDiv.appendChild(logEl);
    debugDiv.scrollTop = debugDiv.scrollHeight;
}

function updateCheck(checkId, status) {
    const el = document.getElementById(checkId);
    if (status === 'success') {
        el.textContent = '✓';
        el.className = 'checkmark success';
    } else if (status === 'error') {
        el.textContent = '✕';
        el.className = 'checkmark error';
    } else {
        el.textContent = '⏳';
        el.className = 'checkmark loading';
    }
}

// Start logging
addLog('Debug mode started', 'info');

// Check Firebase SDK
addLog('Checking Firebase SDK...', 'info');
if (typeof firebase !== 'undefined') {
    addLog('✓ Firebase SDK loaded successfully', 'success');
    updateCheck('check1', 'success');
} else {
    addLog('✗ Firebase SDK NOT found - this is the problem!', 'error');
    updateCheck('check1', 'error');
}

// Try to initialize Firebase
setTimeout(() => {
    try {
        addLog('Attempting Firebase initialization...', 'info');
        
        var firebaseConfig = {
            apiKey: "AIzaSyD_tSXJCOLffm4ZMtM8gXOCH5CXFOKdqWM",
            authDomain: "chichi-001.firebaseapp.com",
            projectId: "chichi-001",
            storageBucket: "chichi-001.firebasestorage.app",
            messagingSenderId: "219736252899",
            appId: "1:219736252899:web:626efc2fe5040efb7500d6"
        };

        if (firebase.apps.length === 0) {
            firebase.initializeApp(firebaseConfig);
            addLog('✓ Firebase app initialized', 'success');
            updateCheck('check2', 'success');
        } else {
            addLog('✓ Firebase already initialized', 'success');
            updateCheck('check2', 'success');
        }

        // Test auth
        addLog('Setting up auth listener...', 'info');
        var auth = firebase.auth();
        
        auth.onAuthStateChanged((user) => {
            if (user) {
                addLog(`✓ Auth listener active - User logged in: ${user.email}`, 'success');
                updateCheck('check3', 'success');
            } else {
                addLog('✓ Auth listener active - No user logged in', 'success');
                updateCheck('check3', 'success');
            }
        });

        // Test database
        addLog('Testing database connection...', 'info');
        var db = firebase.database();
        
        db.ref('.info/connected').on('value', (snap) => {
            if (snap.val() === true) {
                addLog('✓ Database connected successfully', 'success');
                updateCheck('check4', 'success');
            } else {
                addLog('✗ Database connection failed', 'error');
                updateCheck('check4', 'error');
            }
        });

    } catch (err) {
        addLog(`✗ Firebase initialization error: ${err.message}`, 'error');
        updateCheck('check2', 'error');
    }
}, 500);

// Check Cloudinary
setTimeout(() => {
    addLog('Checking Cloudinary preset...', 'info');
    addLog('Upload Preset: chichi_photos (unsigned) - Verify this exists in Cloudinary dashboard', 'warning');
    addLog('Cloud Name: u1uilb6f', 'info');
}, 2000);

// Show common issues
setTimeout(() => {
    addLog('', 'info');
    addLog('🔧 COMMON FIX CHECKLIST:', 'info');
    addLog('1. Firebase Console → Database → Create Realtime Database (if missing)', 'warning');
    addLog('2. Firebase Console → Database → Rules → Allow read/write for testing', 'warning');
    addLog('3. Cloudinary → Settings → Upload → Create unsigned preset "chichi_photos"', 'warning');
    addLog('4. Refresh this page after making changes', 'warning');
}, 3000);

</script>

</body>
</html>
